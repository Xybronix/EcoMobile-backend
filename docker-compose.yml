version: '3.8'

services:
  backend:
    build: .
    container_name: ecomobile-backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - DEPLOY_TARGET=DOCKER
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    networks:
      - ecomobile-net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ecomobile-net:
    external: true
    name: ecomobile_eco-mobile-net
